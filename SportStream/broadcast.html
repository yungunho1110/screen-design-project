<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 한글 중계 정보가 깨지지 않도록 UTF-8 인코딩을 사용합니다. -->
    <meta charset="UTF-8">
    <!-- 브라우저 탭에 표시되는 중계보기 페이지 제목입니다. -->
    <title>SportStream - 중계보기</title>
    <!-- 중계보기 페이지 전용 스타일 파일입니다. -->
    <link rel="stylesheet" href="broadcast.css">
</head>
<body>
    <!-- 상단 헤더: 로고와 모든 페이지로 이동하는 메뉴입니다. -->
    <header>
        <div class="container">
            <!-- 서비스 로고입니다. Stream 글자는 CSS에서 포인트 색상으로 강조합니다. -->
            <h1 class="logo">Sport<span>Stream</span></h1>
            <!-- 사이트 내 주요 페이지로 이동하는 메뉴입니다. -->
            <nav>
                <ul>
                    <li><a href="home.html">홈</a></li>
                    <li><a href="schedule.html">경기일정</a></li>
                    <li><a href="results.html">경기결과</a></li>
                    <li><a href="broadcast.html">중계보기</a></li>
                    <li><a href="login.html">로그인</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 메인 콘텐츠: 라이브 영상 플레이어와 현재 중계 정보를 보여줍니다. -->
    <main class="container">
        <!-- 페이지 제목입니다. page-title 클래스에서 위쪽 여백을 지정합니다. -->
        <h2 class="page-title">경기 하이라이트</h2>

        <!-- 영상 플레이어 박스입니다. iframe을 감싸서 크기와 배경을 일정하게 유지합니다. -->
        <div class="player-wrap">
            <iframe width="100%" height="500px" src="https://www.youtube.com/embed/W36ywkxQTTI?si=ZvuMdBA9KRdVyxnb" title="스포츠 라이브 중계 영상" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>

        <!-- 현재 방송 중인 경기명, 시청자 수, 채팅 버튼을 묶은 정보 박스입니다. -->
        <div class="broadcast-info">
            <h3>[월드컵] 한국 vs 체코</h3>
            <p>시청자 45,231명이 함께 시청 중입니다.</p>
            <button class="btn">채팅 참여하기</button>
        </div>
    </main>

    <!-- 하단 푸터: 사이트 저작권 정보를 표시합니다. -->
    <footer>
        <p>&copy; 2026 SportStream</p>
    </footer>
</body>
</html>
