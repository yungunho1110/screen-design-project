<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportStream - 회원가입</title>
    <link rel="stylesheet" href="join.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">Sport<span>Stream</span></h1>
            <nav>
                <ul>
                    <li><a href="home.html">홈</a></li>
                    <li><a href="schedule.html">경기일정</a></li>
                    <li><a href="results.html">경기결과</a></li>
                    <li><a href="broadcast.html">중계보기</a></li>
                    <li><a href="login.html">로그인</a></li>
                    <li><button id="theme-toggle" class="theme-btn" aria-label="테마 전환">🌙</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="join-box">
            <h2>회원가입</h2>
            <p>신규 계정을 생성하여 더 많은 혜택을 누려보세요.</p>
            
            <form id="join-form" novalidate>
                <div class="input-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" placeholder="닉네임을 입력하세요" required>
                    <div class="error-msg" id="nickname-error"></div>
                </div>

                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@sportstream.com" required>
                    <div class="error-msg" id="email-error"></div>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="8자 이상의 비밀번호" required>
                    <div class="error-msg" id="password-error"></div>
                </div>

                <div class="input-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <input type="password" id="password-confirm" placeholder="비밀번호를 한번 더 입력하세요" required>
                    <div class="error-msg" id="confirm-error"></div>
                </div>

                <div class="agree-group">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">서비스 이용약관 동의 (필수)</label>
                    <div class="error-msg" id="agree-error"></div>
                </div>

                <button type="submit" class="btn">가입하기</button>
            </form>
            
            <div class="login-link">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SportStream. All rights reserved.</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateToggleIcon(currentTheme);
        
        themeToggle.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateToggleIcon(theme);
        });
        
        function updateToggleIcon(theme) {
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        const joinForm = document.getElementById('join-form');
        const nickname = document.getElementById('nickname');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const passwordConfirm = document.getElementById('password-confirm');
        const agree = document.getElementById('agree');

        nickname.addEventListener('blur', validateNickname);
        email.addEventListener('blur', validateEmail);
        password.addEventListener('blur', validatePassword);
        passwordConfirm.addEventListener('blur', validatePasswordConfirm);
        agree.addEventListener('change', validateAgree);

        function validateNickname() {
            const errorDiv = document.getElementById('nickname-error');
            if (nickname.value.trim() === '') {
                errorDiv.textContent = '닉네임을 입력해 주세요.';
                nickname.classList.add('invalid');
                return false;
            } else {
                errorDiv.textContent = '';
                nickname.classList.remove('invalid');
                return true;
            }
        }

        function validateEmail() {
            const errorDiv = document.getElementById('email-error');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (email.value.trim() === '') {
                errorDiv.textContent = '이메일 주소를 입력해 주세요.';
                email.classList.add('invalid');
                return false;
            } else if (!emailRegex.test(email.value)) {
                errorDiv.textContent = '올바른 이메일 형식이 아닙니다 (예: user@example.com).';
                email.classList.add('invalid');
                return false;
            } else if (email.value === 'admin@sportstream.com' || email.value === 'test@sportstream.com') {
                // 기획서 07: "이미 사용 중인 이메일 입력 시 안내 메시지" 시뮬레이션
                errorDiv.textContent = '이미 등록된 이메일입니다.';
                email.classList.add('invalid');
                return false;
            } else {
                errorDiv.textContent = '';
                email.classList.remove('invalid');
                return true;
            }
        }

        function validatePassword() {
            const errorDiv = document.getElementById('password-error');
            if (password.value.length < 8) {
                errorDiv.textContent = '비밀번호는 최소 8자 이상이어야 합니다.';
                password.classList.add('invalid');
                return false;
            } else {
                errorDiv.textContent = '';
                password.classList.remove('invalid');
                return true;
            }
        }

        function validatePasswordConfirm() {
            const errorDiv = document.getElementById('confirm-error');
            if (passwordConfirm.value !== password.value) {
                errorDiv.textContent = '비밀번호가 일치하지 않습니다.';
                passwordConfirm.classList.add('invalid');
                return false;
            } else if (passwordConfirm.value.trim() === '') {
                errorDiv.textContent = '비밀번호 확인을 입력해 주세요.';
                passwordConfirm.classList.add('invalid');
                return false;
            } else {
                errorDiv.textContent = '';
                passwordConfirm.classList.remove('invalid');
                return true;
            }
        }

        function validateAgree() {
            const errorDiv = document.getElementById('agree-error');
            if (!agree.checked) {
                errorDiv.textContent = '서비스 이용약관에 동의하셔야 합니다.';
                return false;
            } else {
                errorDiv.textContent = '';
                return true;
            }
        }

        joinForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const isNickValid = validateNickname();
            const isEmailValid = validateEmail();
            const isPassValid = validatePassword();
            const isConfValid = validatePasswordConfirm();
            const isAgreeValid = validateAgree();

            if (isNickValid && isEmailValid && isPassValid && isConfValid && isAgreeValid) {
                alert('회원가입이 완료되었습니다! 홈 화면으로 이동합니다.');
                window.location.href = 'home.html';
            }
        });
    </script>
</body>
</html>
